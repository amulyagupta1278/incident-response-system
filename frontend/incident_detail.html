<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incident Details - AIOC</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Incident Details</h1>
            <a href="/" class="back-link">&larr; Back to Dashboard</a>
        </header>

        <div id="incident-content" class="incident-content">
            <p class="loading">Loading incident details...</p>
        </div>

        <section class="chat-section">
            <h3>&#128172; Ask the Incident</h3>
            <div id="chat-log" class="chat-log"></div>
            <div class="chat-input-row">
                <input id="chat-input" type="text"
                       placeholder="e.g. What changed before the incident? How many users are affected?"
                       onkeydown="if (event.key === 'Enter') askIncident()">
                <button class="btn btn-primary" onclick="askIncident()">Ask</button>
            </div>
        </section>
    </div>

    <script>
        const severityColors = {
            critical: "#d32f2f",
            high: "#f57c00",
            medium: "#fbc02d",
            low: "#388e3c"
        };

        const agentLabels = {
            router_agent: "Router",
            incident_commander: "Incident Commander",
            log_analysis: "Log Analysis",
            metrics_analysis: "Metrics Analysis",
            rca_agent: "RCA Agent",
            rca_analysis: "RCA Agent",
            request_more_data_agent: "Request More Data",
            business_impact: "Business Impact",
            executive_summary: "Executive Summary",
            memory: "Incident Memory"
        };

        let poller = null;

        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text == null ? "" : String(text);
            return div.innerHTML;
        }

        function getIncidentId() {
            const params = new URLSearchParams(window.location.search);
            let id = params.get("id");
            if (!id) {
                const parts = window.location.pathname.split("/");
                id = parts[parts.length - 1];
            }
            return id;
        }

        function formatMoney(value) {
            return `$${Number(value || 0).toFixed(2)}`;
        }

        function compactLogEntry(entry) {
            return `${entry.timestamp || ""} ${entry.level || ""} ${entry.message || ""}`;
        }

        async function loadIncidentDetails() {
            const incidentId = getIncidentId();
            if (!incidentId) {
                document.getElementById("incident-content").innerHTML =
                    "<p class='error'>No incident ID provided.</p>";
                return;
            }

            try {
                const response = await fetch(`/api/incidents/${incidentId}`);
                if (!response.ok) throw new Error(`Failed to fetch incident: ${response.status}`);

                const incident = await response.json();
                displayIncidentDetails(incident);

                if (incident.current_status !== "complete" && incident.current_status !== "failed") {
                    if (!poller) poller = setInterval(loadIncidentDetails, 1000);
                } else if (poller) {
                    clearInterval(poller);
                    poller = null;
                }
            } catch (error) {
                console.error("Error loading incident:", error);
                document.getElementById("incident-content").innerHTML =
                    `<p class='error'>Failed to load incident: ${escapeHtml(error.message)}</p>`;
            }
        }

        function displayIncidentDetails(incident) {
            const severityColor = severityColors[incident.severity] || "#757575";

            const statusBanner = incident.current_status !== "complete" ? `
                <div class="status-banner ${incident.current_status === "failed" ? "status-banner-failed" : ""}">
                    ${incident.current_status === "failed"
                        ? `Analysis failed: ${escapeHtml(incident.error || "unknown error")}`
                        : `<span class="pulse"></span> Agents still investigating (${escapeHtml(incident.current_status.replace(/_/g, " "))}) — this page updates live`}
                </div>` : "";

            const rcaSection = incident.root_cause ? `
                <section class="collapsible-section">
                    <h3 class="section-title" onclick="toggleSection(this)">&#9660; Root Cause Analysis</h3>
                    <div class="section-content">
                        <div class="rca-hypothesis">
                            <strong>Hypothesis:</strong> ${escapeHtml(incident.root_cause.hypothesis)}
                        </div>
                        <div class="confidence-meter">
                            <strong>Confidence:</strong>
                            <div class="confidence-bar">
                                <div class="confidence-fill" style="width: ${incident.root_cause.confidence * 100}%;"></div>
                            </div>
                            <span>${(incident.root_cause.confidence * 100).toFixed(0)}%</span>
                        </div>
                        ${incident.root_cause.deploy_correlation ? `
                            <div class="deploy-callout">&#9889; ${escapeHtml(incident.root_cause.deploy_correlation)}</div>
                        ` : ""}
                        <div class="evidence-list">
                            <strong>Supporting Evidence:</strong>
                            <ul>
                                ${(incident.root_cause.supporting_evidence || []).map(e => `<li>${escapeHtml(e)}</li>`).join("")}
                            </ul>
                        </div>
                        ${(incident.root_cause.ruled_out_hypotheses || []).length > 0 ? `
                            <div class="ruled-out-list">
                                <strong>Alternatives Considered &amp; Ruled Out:</strong>
                                <ul>
                                    ${incident.root_cause.ruled_out_hypotheses.map(r => `
                                        <li><s>${escapeHtml(r.hypothesis)}</s> &mdash; ${escapeHtml(r.reason)}</li>
                                    `).join("")}
                                </ul>
                            </div>
                        ` : ""}
                    </div>
                </section>
            ` : "";

            const logAnomaliesSection = (incident.log_anomalies || []).length > 0 ? `
                <section class="collapsible-section">
                    <h3 class="section-title" onclick="toggleSection(this)">&#9660; Log Anomalies (${incident.log_anomalies.length})</h3>
                    <div class="section-content">
                        ${incident.log_anomalies.map(anomaly => `
                            <div class="anomaly-item">
                                <div class="anomaly-header">
                                    <strong>${escapeHtml(anomaly.type)}</strong>
                                    <span class="count-badge">${anomaly.count}</span>
                                </div>
                                <p class="anomaly-detail">Spike Factor: ${anomaly.spike_factor}x baseline</p>
                                <p class="anomaly-detail">Severity: ${escapeHtml(anomaly.severity)}</p>
                                ${anomaly.evidence && anomaly.evidence.length > 0 ? `
                                    <details class="evidence-details">
                                        <summary>Evidence (${anomaly.evidence.length})</summary>
                                        <ul>${anomaly.evidence.map(e => `<li>${escapeHtml(e)}</li>`).join("")}</ul>
                                    </details>
                                ` : ""}
                            </div>
                        `).join("")}
                    </div>
                </section>
            ` : "";

            const metricAnomaliesSection = (incident.metric_anomalies || []).length > 0 ? `
                <section class="collapsible-section">
                    <h3 class="section-title" onclick="toggleSection(this)">&#9660; Metric Anomalies (${incident.metric_anomalies.length})</h3>
                    <div class="section-content">
                        ${incident.metric_anomalies.map(metric => `
                            <div class="anomaly-item">
                                <div class="anomaly-header">
                                    <strong>${escapeHtml(metric.metric_name)}</strong>
                                    <span class="count-badge">${metric.percent_change.toFixed(1)}%</span>
                                </div>
                                <p class="anomaly-detail">Baseline: ${metric.baseline} &rarr; Current: ${metric.current}</p>
                                <p class="anomaly-detail">Severity: ${escapeHtml(metric.severity)}</p>
                            </div>
                        `).join("")}
                    </div>
                </section>
            ` : "";

            const deploymentsSection = (incident.deployment_changes || []).length > 0 ? `
                <section class="collapsible-section">
                    <h3 class="section-title" onclick="toggleSection(this)">&#9660; Recent Deployments (${incident.deployment_changes.length})</h3>
                    <div class="section-content">
                        ${incident.deployment_changes.map(dep => `
                            <div class="anomaly-item">
                                <pre class="deployment-json">${escapeHtml(JSON.stringify(dep, null, 2))}</pre>
                            </div>
                        `).join("")}
                    </div>
                </section>
            ` : "";

            const businessImpactSection = `
                <section class="collapsible-section">
                    <h3 class="section-title" onclick="toggleSection(this)">&#9660; Business Impact</h3>
                    <div class="section-content">
                        <div class="impact-metric">
                            <strong>Affected Users:</strong>
                            <span class="metric-value">${(incident.affected_users || 0).toLocaleString()}</span>
                        </div>
                        <div class="impact-metric">
                            <strong>Revenue Impact:</strong>
                            <span class="metric-value">$${(incident.estimated_revenue_impact_per_minute || 0).toFixed(2)}/minute</span>
                        </div>
                    </div>
                </section>
            `;

            const impact = incident.revenue_impact_justification || {};
            const impactJustificationSection = Object.keys(impact).length > 0 ? `
                <section class="collapsible-section">
                    <h3 class="section-title" onclick="toggleSection(this)">&#9660; Revenue Impact Justification</h3>
                    <div class="section-content">
                        <div class="impact-formula">
                            <strong>${escapeHtml(impact.formula)}</strong>
                            <span>${(impact.affected_users || 0).toLocaleString()} users &times; ${formatMoney(impact.revenue_per_user_per_minute)}/user/min = ${formatMoney(impact.revenue_impact_per_minute)}/minute</span>
                        </div>
                        <div class="detail-grid">
                            <div class="detail-item"><strong>Verification:</strong> ${escapeHtml(impact.verification_status || "unknown")}</div>
                            <div class="detail-item"><strong>Confidence:</strong> ${escapeHtml(impact.confidence_level || "unknown")}</div>
                            <div class="detail-item"><strong>Source:</strong> ${escapeHtml(impact.impact_rate_source || "")}</div>
                            <div class="detail-item"><strong>Observed Rate:</strong> ${((impact.observed_impact_rate || 0) * 100).toFixed(1)}%</div>
                            <div class="detail-item"><strong>Bounded Rate:</strong> ${((impact.bounded_impact_rate || 0) * 100).toFixed(1)}%</div>
                            <div class="detail-item"><strong>Range:</strong> ${formatMoney(impact.lower_bound_per_minute)}-${formatMoney(impact.upper_bound_per_minute)}/min</div>
                            <div class="detail-item"><strong>User Limit:</strong> ${(impact.limits?.affected_users_ceiling || 0).toLocaleString()}</div>
                            <div class="detail-item"><strong>Rate Limit:</strong> ${((impact.limits?.impact_rate_ceiling || 1) * 100).toFixed(0)}%</div>
                        </div>
                        ${(impact.data_gaps || []).length > 0 ? `
                            <div class="impact-warning">
                                <strong>Data gaps:</strong>
                                <ul>${impact.data_gaps.map(gap => `<li>${escapeHtml(gap)}</li>`).join("")}</ul>
                            </div>
                        ` : ""}
                    </div>
                </section>
            ` : "";

            const logCache = incident.log_context_cache || {};
            const logContextSection = Object.keys(logCache).length > 0 ? `
                <section class="collapsible-section">
                    <h3 class="section-title" onclick="toggleSection(this)">&#9660; Centralized Log Context</h3>
                    <div class="section-content">
                        <div class="detail-grid">
                            <div class="detail-item"><strong>Total Logs:</strong> ${(logCache.total_logs_scanned || 0).toLocaleString()}</div>
                            <div class="detail-item"><strong>Cached Contexts:</strong> ${(logCache.error_contexts || []).length}</div>
                            <div class="detail-item"><strong>Level Counts:</strong> ${escapeHtml(JSON.stringify(logCache.level_counts || {}))}</div>
                        </div>
                        ${(logCache.hierarchy || []).length > 0 ? `
                            <div class="log-hierarchy">
                                ${(logCache.hierarchy || []).map(item => `
                                    <div class="log-hierarchy-row">
                                        <span class="mini-badge mini-badge-${escapeHtml(item.severity || "grey")}">${escapeHtml(item.severity || "unknown")}</span>
                                        <strong>${escapeHtml(item.type)}</strong>
                                        <span>${item.count} events</span>
                                        <span>${escapeHtml(item.first_seen || "")} &rarr; ${escapeHtml(item.last_seen || "")}</span>
                                    </div>
                                `).join("")}
                            </div>
                        ` : ""}
                        ${(logCache.error_contexts || []).length > 0 ? `
                            <details class="evidence-details">
                                <summary>Error Context Windows (${(logCache.error_contexts || []).length})</summary>
                                ${(logCache.error_contexts || []).map(ctx => `
                                    <div class="log-context-window">
                                        <strong>${escapeHtml(ctx.level)} / ${escapeHtml(ctx.pattern)}</strong>
                                        <p>${escapeHtml(ctx.message)}</p>
                                        <pre>${escapeHtml((ctx.context_window || []).map(compactLogEntry).join("\\n"))}</pre>
                                    </div>
                                `).join("")}
                            </details>
                        ` : ""}
                    </div>
                </section>
            ` : "";

            const decisions = incident.remediation_decisions || {};
            const recommendationsSection = (incident.recovery_recommendations || []).length > 0 ? `
                <section class="collapsible-section">
                    <h3 class="section-title" onclick="toggleSection(this)">&#9660; Recovery Actions (Human Approval Required)</h3>
                    <div class="section-content">
                        ${incident.recovery_recommendations.map((rec, i) => {
                            const d = decisions[String(i)];
                            const controls = d
                                ? `<span class="decision-badge decision-${d.decision}">${d.decision.toUpperCase()}</span>`
                                : `<span class="decision-controls">
                                       <button class="btn-approve" onclick="decideRemediation(${i}, 'approved')">Approve</button>
                                       <button class="btn-reject" onclick="decideRemediation(${i}, 'rejected')">Reject</button>
                                   </span>`;
                            return `<div class="remediation-item"><span class="remediation-text">${i + 1}. ${escapeHtml(rec)}</span>${controls}</div>`;
                        }).join("")}
                        <p class="gate-note">No action is executed without explicit human approval.</p>
                    </div>
                </section>
            ` : "";

            const similarSection = (incident.similar_incidents || []).length > 0 ? `
                <section class="collapsible-section">
                    <h3 class="section-title" onclick="toggleSection(this)">&#9660; Seen Before — Similar Past Incidents (${incident.similar_incidents.length})</h3>
                    <div class="section-content">
                        ${incident.similar_incidents.map(s => `
                            <div class="similar-callout">&#128257; Matches incident #${s.number} on <strong>${escapeHtml(s.service)}</strong>
                            (${escapeHtml(String(s.resolved_at || "").slice(0, 10))}) &mdash; ${escapeHtml(s.hypothesis)}
                            <em>(${escapeHtml(s.match_reason || "")})</em></div>
                        `).join("")}
                    </div>
                </section>
            ` : "";

            const actionsBar = incident.current_status === "complete" ? `
                <div class="actions-bar">
                    <a class="btn btn-primary" href="/api/incidents/${escapeHtml(incident.incident_id)}/postmortem">&#128196; Download Postmortem (.md)</a>
                </div>
            ` : "";

            const auditTrailSection = (incident.agent_invocations || []).length > 0 ? `
                <section class="collapsible-section">
                    <h3 class="section-title" onclick="toggleSection(this)">&#9660; Agent Reasoning &amp; Audit Trail (${incident.agent_invocations.length} invocations, ${incident.analysis_iterations} iterations)</h3>
                    <div class="section-content">
                        <table class="audit-table">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Agent</th>
                                    <th>Action</th>
                                    <th>Reasoning / Findings</th>
                                    <th>Source</th>
                                    <th>Time</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${incident.agent_invocations.map((inv, i) => `
                                    <tr>
                                        <td>${i + 1}</td>
                                        <td><strong>${escapeHtml(agentLabels[inv.agent] || inv.agent)}</strong></td>
                                        <td>${escapeHtml(inv.action)}</td>
                                        <td class="audit-reasoning">${auditDetail(inv)}</td>
                                        <td>${sourceBadge(inv.source)}</td>
                                        <td>${new Date(inv.timestamp).toLocaleTimeString()}</td>
                                    </tr>
                                `).join("")}
                            </tbody>
                        </table>
                    </div>
                </section>
            ` : "";

            const summariesSection = `
                <section class="summaries-section">
                    <div class="summary-pane">
                        <h3>Engineering Summary</h3>
                        <pre class="summary-text">${escapeHtml(incident.engineering_summary)}</pre>
                    </div>
                    <div class="summary-pane">
                        <h3>Executive Summary</h3>
                        <pre class="summary-text">${escapeHtml(incident.executive_summary)}</pre>
                    </div>
                </section>
            `;

            const alertMetadata = `
                <section class="metadata-section">
                    <h2>Alert Metadata</h2>
                    <div class="metadata-grid">
                        <div class="metadata-item"><strong>Service:</strong> <code>${escapeHtml(incident.service)}</code></div>
                        <div class="metadata-item"><strong>Incident ID:</strong> <code>${escapeHtml(incident.incident_id)}</code></div>
                        <div class="metadata-item"><strong>Timestamp:</strong> <code>${new Date(incident.timestamp).toLocaleString()}</code></div>
                        <div class="metadata-item">
                            <strong>Severity:</strong>
                            <span class="severity-badge" style="background-color: ${severityColor};">
                                ${escapeHtml((incident.severity || "unknown").toUpperCase())}
                            </span>
                        </div>
                        <div class="metadata-item" style="grid-column: 1 / -1;">
                            <strong>Description:</strong> ${escapeHtml(incident.alert_description)}
                        </div>
                    </div>
                </section>
            `;

            document.getElementById("incident-content").innerHTML = `
                ${statusBanner}
                ${actionsBar}
                ${alertMetadata}
                ${summariesSection}
                ${rcaSection}
                ${similarSection}
                ${logAnomaliesSection}
                ${logContextSection}
                ${metricAnomaliesSection}
                ${deploymentsSection}
                ${businessImpactSection}
                ${impactJustificationSection}
                ${recommendationsSection}
                ${auditTrailSection}
            `;
        }

        function auditDetail(inv) {
            if (inv.reasoning) return escapeHtml(inv.reasoning);
            if (inv.hypothesis) return `${escapeHtml(inv.hypothesis)} (${((inv.confidence || 0) * 100).toFixed(0)}%)`;
            if (inv.data_requested) return escapeHtml(inv.data_requested.join("; "));
            const findings = inv.findings || inv.data_points;
            if (findings) {
                return Object.entries(findings)
                    .filter(([, v]) => typeof v !== "object")
                    .map(([k, v]) => `${escapeHtml(k.replace(/_/g, " "))}: ${escapeHtml(v)}`)
                    .join(", ");
            }
            return "—";
        }

        function sourceBadge(source) {
            if (!source) return '<span class="mini-badge mini-badge-grey">rule</span>';
            if (source.startsWith("rag:llm")) {
                const parts = source.split(":");
                const model = (parts[2] || "llm").split("+")[0];
                return `<span class="mini-badge mini-badge-rag">RAG ${escapeHtml(model)}</span>`;
            }
            if (source.startsWith("llm")) {
                const model = source.split(":")[1] || "llm";
                return `<span class="mini-badge">${escapeHtml(model)}</span>`;
            }
            return `<span class="mini-badge mini-badge-grey">${escapeHtml(source)}</span>`;
        }

        function ragEvidenceHtml(data) {
            const citations = data.citations || [];
            const retrieved = data.retrieved_chunks || [];
            if (!citations.length && !retrieved.length) return "";

            const citationChips = citations.length ? `
                <div class="rag-citations">
                    ${citations.map(c => `
                        <span class="rag-citation">${escapeHtml(c.chunk_id)} ${escapeHtml(c.label)}</span>
                    `).join("")}
                </div>
            ` : "";

            const evidenceList = retrieved.length ? `
                <details class="rag-evidence">
                    <summary>Retrieved evidence (${retrieved.length})</summary>
                    <ul>
                        ${retrieved.map(chunk => `
                            <li>
                                <strong>${escapeHtml(chunk.chunk_id)} ${escapeHtml(chunk.label)}</strong>
                                <span>${escapeHtml(chunk.source_type)}</span>
                            </li>
                        `).join("")}
                    </ul>
                </details>
            ` : "";

            return `${citationChips}${evidenceList}`;
        }

        async function askIncident() {
            const input = document.getElementById("chat-input");
            const log = document.getElementById("chat-log");
            const question = input.value.trim();
            if (!question) return;
            input.value = "";
            log.innerHTML += `<div class="chat-msg chat-user">${escapeHtml(question)}</div>`;
            log.innerHTML += `<div class="chat-msg chat-agent chat-pending">Thinking&hellip;</div>`;
            log.scrollTop = log.scrollHeight;
            try {
                const res = await fetch(`/api/incidents/${getIncidentId()}/ask`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ question })
                });
                if (!res.ok) throw new Error(`status ${res.status}`);
                const data = await res.json();
                log.querySelector(".chat-pending").outerHTML =
                    `<div class="chat-msg chat-agent">
                        <div>${escapeHtml(data.answer)} ${sourceBadge(data.source)}</div>
                        ${ragEvidenceHtml(data)}
                    </div>`;
            } catch (e) {
                log.querySelector(".chat-pending").outerHTML =
                    `<div class="chat-msg chat-agent">Sorry, something went wrong: ${escapeHtml(e.message)}</div>`;
            }
            log.scrollTop = log.scrollHeight;
        }

        async function decideRemediation(index, decision) {
            try {
                const res = await fetch(`/api/incidents/${getIncidentId()}/remediation/${index}/decision`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ decision })
                });
                if (!res.ok) throw new Error(`status ${res.status}`);
                loadIncidentDetails();
            } catch (e) {
                console.error("Failed to record decision:", e);
            }
        }

        function toggleSection(titleElement) {
            const section = titleElement.parentElement;
            const content = section.querySelector(".section-content");
            const isOpen = content.style.display !== "none";
            content.style.display = isOpen ? "none" : "block";
            titleElement.innerHTML = (isOpen ? "&#9654;" : "&#9660;") + titleElement.innerHTML.substring(1);
        }

        window.addEventListener("load", loadIncidentDetails);
    </script>
</body>
</html>
